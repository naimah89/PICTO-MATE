<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICTOMATE - Kalendar Temujanji Pintar</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4A90E2;
            --primary-light: #EBF3FC;
            --accent: #FF6B6B;
            --accent-light: #FFEBEB;
            --text-main: #2C3E50;
            --bg-body: #F8FAFC;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 24px;
            overflow: hidden;
        }

        /* Header Style */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header p {
            font-size: 0.85rem;
            color: #7F8C8D;
            margin-top: 4px;
        }

        /* Form Input */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        /* Button */
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background: #357ABD;
        }

        /* Result Section */
        .result-section {
            display: none;
            margin-top: 24px;
            border-top: 2px dashed #E2E8F0;
            padding-top: 24px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mini Calendar Visual */
        .mini-calendar {
            background: var(--primary-light);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid rgba(74, 144, 226, 0.2);
        }

        .cal-month {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .cal-date {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            margin: 8px 0;
        }

        .cal-day {
            font-size: 0.9rem;
            font-weight: 600;
            color: #566573;
        }

        /* Reminder Box */
        .reminder-box {
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            border-radius: 0 12px 12px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .reminder-box i {
            color: var(--accent);
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .reminder-text h4 {
            font-size: 0.95rem;
            color: #C0392B;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .reminder-text p {
            font-size: 0.85rem;
            color: #7B241C;
            line-height: 1.4;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #BDC3C7;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-area">
            <i class="fa-solid fa-bookmark"></i> PICTOMATE
        </div>
        <h1>Temujanji Digital</h1>
        <p>Sila masukkan maklumat kad TCA anak anda</p>
    </div>

    <!-- Input Form -->
    <div class="form-group">
        <label>Pilih Tarikh Temujanji KKS</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-calendar-day"></i>
            <input type="date" id="tcaDate" required>
        </div>
    </div>

    <div class="form-group">
        <label>Tujuan Check-up (Umur Anak)</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-baby"></i>
            <select id="childAge">
                <option value="18m">1 Tahun 6 Bulan (Imunisasi & Saringan)</option>
                <option value="2y">2 Tahun (Saringan Perkembangan)</option>
                <option value="3y">3 Tahun (Saringan Perkembangan)</option>
                <option value="4y">4 Tahun (Saringan Perkembangan)</option>
                <option value="5y">5 Tahun (Prasekolah / Imunisasi)</option>
            </select>
        </div>
    </div>

    <button class="btn-submit" onclick="generateReminder()">
        <i class="fa-solid fa-bell"></i> Set Peringatan Pintar
    </button>

    <!-- Result / Visual Calendar -->
    <div class="result-section" id="resultSection">
        <div class="mini-calendar">
            <div class="cal-month" id="calMonth">JANUARI</div>
            <div class="cal-date" id="calDate">01</div>
            <div class="cal-day" id="calDay">KHAMIS</div>
        </div>

        <div class="reminder-box">
            <i class="fa-solid fa-circle-exclamation animate__animated animate__pulse animate__infinite"></i>
            <div class="reminder-text">
                <h4>Jangan Lupa Hadir!</h4>
                <p id="reminderDesc">Sila bawa Buku Rekod Kesihatan Kanak-kanak ke Klinik Kesihatan pada tarikh yang ditetapkan.</p>
            </div>
        </div>
        
        <p class="footer-note">Sistem Peringatan Pintar Klinik Kesihatan</p>
    </div>
</div>

<script>
    function generateReminder() {
        const dateInput = document.getElementById('tcaDate').value;
        const ageSelect = document.getElementById('childAge');
        const ageText = ageSelect.options[ageSelect.selectedIndex].text;
        
        if (!dateInput) {
            alert('Sila pilih tarikh temujanji terlebih dahulu ya!');
            return;
        }

        // Tukar format tarikh untuk dipaparkan pada kalendar visual
        const dateObj = new Date(dateInput);
        
        const months = [
            "Januari", "Februari", "Mac", "April", "Mei", "Jun", 
            "Julai", "Ogos", "September", "Oktober", "November", "Disember"
        ];
        
        const days = [
            "Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"
        ];

        // Masukkan data ke dalam element kalendar visual
        document.getElementById('calMonth').innerText = months[dateObj.getMonth()];
        document.getElementById('calDate').innerText = String(dateObj.getDate()).padStart(2, '0');
        document.getElementById('calDay').innerText = days[dateObj.getDay()];

        // Tukar teks peringatan mengikut umur yang dipilih
        const reminderDesc = document.getElementById('reminderDesc');
        reminderDesc.innerHTML = `Temujanji anak anda untuk <strong>${ageText}</strong> telah disimpan secara digital. Sila ambil gambar (screenshot) halaman ini atau set alarm telefon anda pada tarikh ini!`;

        // Paparkan bahagian keputusan
        document.getElementById('resultSection').style.display = 'block';
        
        // Auto scroll ke bawah sedikit untuk pengguna phone
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: 'smooth'
        });
    }
</script>

</body>
</html>
